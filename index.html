<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>讀經計劃 2026</title>
    <style>
      :root {
        color-scheme: light;
        --背景: #f5efe7;
        --卡片: rgba(255, 255, 255, 0.9);
        --卡片實: #ffffff;
        --文字: #1f2937;
        --次字: #6b7280;
        --線: rgba(31, 41, 55, 0.1);
        --主色: #b45309;
        --主色深: #7c2d12;
        --主色淡: rgba(180, 83, 9, 0.12);
        --成功: #0f766e;
        --陰影: 0 24px 70px rgba(17, 24, 39, 0.14);
        --圓角大: 28px;
        --圓角中: 20px;
        --圓角細: 14px;
      }

      * { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
        color: var(--文字);
        background:
          radial-gradient(circle at top left, rgba(180, 83, 9, 0.12), transparent 35%),
          radial-gradient(circle at top right, rgba(15, 118, 110, 0.12), transparent 32%),
          linear-gradient(180deg, #fbf8f2 0%, var(--背景) 100%);
      }

      button, a, input { font: inherit; }
      a { color: inherit; text-decoration: none; }
      button { cursor: pointer; }

      .殼 {
        width: min(1320px, calc(100% - 24px));
        margin: 0 auto;
      }

      .頁首 {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-end;
        padding: 28px 0 18px;
      }

      .標籤 {
        margin: 0 0 10px;
        color: var(--主色);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1, h2, h3 {
        margin: 0;
        letter-spacing: -0.02em;
      }

      h1 {
        font-size: clamp(2.3rem, 5vw, 4.6rem);
        line-height: 0.96;
        max-width: 10ch;
      }

      .引言 {
        margin: 14px 0 0;
        max-width: 58ch;
        color: var(--次字);
        line-height: 1.7;
        font-size: 1.02rem;
      }

      .動作列 {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .按鈕, .按鈕主, .月標籤, .日標籤 {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 16px;
        border: 1px solid var(--線);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      }

      .按鈕主 {
        color: #fff;
        background: linear-gradient(135deg, var(--主色), var(--主色深));
        border-color: transparent;
      }

      .按鈕:hover, .按鈕主:hover, .卡片:hover, .日卡:hover {
        transform: translateY(-1px);
      }

      .主版 {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.85fr);
        gap: 22px;
        padding-bottom: 32px;
      }

      .卡片, .日卡, .詳情 {
        background: var(--卡片);
        backdrop-filter: blur(16px);
        border: 1px solid var(--線);
        box-shadow: var(--陰影);
        border-radius: var(--圓角大);
      }

      .卡片 {
        overflow: hidden;
      }

      .卡片內, .詳情內 {
        padding: 22px;
      }

      .統計列 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .統計 {
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid var(--線);
        border-radius: var(--圓角中);
        padding: 16px;
      }

      .統計 strong {
        display: block;
        font-size: 1.5rem;
        margin-bottom: 4px;
      }

      .統計 span, .細字, .章節, .狀態, .標題小 {
        color: var(--次字);
      }

      .進度條 {
        width: 100%;
        height: 10px;
        background: rgba(31, 41, 55, 0.08);
        border-radius: 999px;
        overflow: hidden;
      }

      .進度填充 {
        width: 0;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--主色), #d97706 55%, #f59e0b);
        transition: width 220ms ease;
      }

      .月份區 {
        display: grid;
        gap: 16px;
      }

      .月份卡 {
        padding: 18px;
      }

      .月份頭 {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }

      .月份頭 h2 {
        font-size: 1.35rem;
      }

      .月份內文 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .日卡 {
        position: relative;
        padding: 16px;
        display: grid;
        gap: 10px;
        cursor: pointer;
      }

      .日卡.已選 {
        border-color: rgba(180, 83, 9, 0.34);
        box-shadow: 0 24px 60px rgba(180, 83, 9, 0.14);
      }

      .日卡頭 {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .日號 {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 52px;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--主色淡);
        color: var(--主色深);
        font-weight: 800;
      }

      .經文 {
        font-size: 1rem;
        line-height: 1.55;
        font-weight: 700;
      }

      .主題 {
        font-size: 0.95rem;
        line-height: 1.6;
      }

      .已讀列 {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--文字);
        font-weight: 600;
      }

      .已讀列 input {
        width: 18px;
        height: 18px;
        accent-color: var(--成功);
      }

      .詳情 {
        position: sticky;
        top: 20px;
        height: fit-content;
      }

      .詳情空白 {
        color: var(--次字);
        line-height: 1.8;
      }

      .詳情標頭 {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        margin-bottom: 14px;
      }

      .詳情標頭 h2 {
        font-size: 1.45rem;
      }

      .詳情正文 {
        display: grid;
        gap: 14px;
      }

      .詳情區塊 {
        padding: 14px 16px;
        border-radius: var(--圓角中);
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid var(--線);
      }

      .經文按鈕 {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--主色深);
        font-weight: 800;
        cursor: pointer;
      }

      .經文按鈕:hover {
        text-decoration: underline;
      }

      .全文經文區 {
        display: grid;
        gap: 12px;
        padding: 16px;
        border-radius: var(--圓角中);
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid var(--線);
      }

      .全文經文頭 {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .全文經文頭 h3 {
        font-size: 1.05rem;
        line-height: 1.4;
      }

      .全文經文容器 {
        display: grid;
        gap: 10px;
      }

      .節列 {
        display: grid;
        grid-template-columns: 38px 1fr;
        gap: 10px;
        align-items: start;
      }

      .節號 {
        text-align: right;
        font-weight: 800;
        color: var(--主色);
        font-variant-numeric: tabular-nums;
        padding-top: 1px;
      }

      .節文 {
        line-height: 1.9;
        color: var(--文字);
        word-break: break-word;
      }

      .經文載入,
      .經文錯誤 {
        padding: 12px 14px;
        border-radius: var(--圓角細);
        background: rgba(255, 255, 255, 0.78);
        border: 1px dashed rgba(180, 83, 9, 0.24);
        color: var(--次字);
      }

      .經文錯誤 {
        color: #b42318;
        border-style: solid;
        border-color: rgba(180, 35, 24, 0.18);
      }

      .卡片全文容器 {
        margin-top: 8px;
      }

      .卡片全文容器 .全文經文區 {
        margin-top: 0;
      }

      .詳情區塊 .細字 {
        display: block;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.72rem;
      }

      .朗讀列 {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .月標籤, .日標籤 {
        min-height: 40px;
        background: rgba(255, 255, 255, 0.8);
      }

      .月標籤.啟用 {
        background: rgba(180, 83, 9, 0.12);
        border-color: rgba(180, 83, 9, 0.26);
      }

      .提示 {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: var(--圓角中);
        background: rgba(255, 255, 255, 0.72);
        border: 1px dashed rgba(180, 83, 9, 0.26);
        color: var(--次字);
        line-height: 1.7;
      }

      @media (max-width: 1080px) {
        .主版 { grid-template-columns: 1fr; }
        .詳情 { position: static; }
      }

      @media (max-width: 900px) {
        .月份內文 {
          grid-template-columns: 1fr;
        }

        .月份卡,
        .卡片內,
        .詳情內 {
          padding: 18px;
        }

        .統計列 {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .頁首 { flex-direction: column; align-items: flex-start; }
        .動作列 {
          width: 100%;
          justify-content: stretch;
        }

        .按鈕,
        .按鈕主 {
          flex: 1 1 calc(50% - 10px);
        }

        .按鈕主,
        .按鈕 {
          min-width: 0;
        }

        .日卡 {
          padding: 14px;
        }

        .詳情標頭 {
          flex-direction: column;
          align-items: flex-start;
        }

        .朗讀列 {
          width: 100%;
        }

        .朗讀列 .按鈕,
        .朗讀列 .按鈕主 {
          flex: 1 1 100%;
        }

        .殼 { width: min(100% - 18px, 1320px); }
        h1 { font-size: 2.2rem; }
        .引言 {
          font-size: 0.98rem;
        }
      }

      @media (max-width: 520px) {
        .頁首 {
          padding-top: 20px;
        }

        .卡片內,
        .詳情內,
        .月份卡 {
          padding: 16px;
        }

        .標籤 {
          letter-spacing: 0.14em;
        }

        h1 {
          max-width: 12ch;
        }

        .日號,
        .月標籤,
        .日標籤 {
          min-height: 36px;
          padding: 6px 10px;
          font-size: 0.92rem;
        }

        .經文 {
          font-size: 0.98rem;
        }

        .主題 {
          font-size: 0.92rem;
        }

        .詳情標頭 h2,
        .月份頭 h2 {
          font-size: 1.2rem;
        }

        .節列 {
          grid-template-columns: 32px 1fr;
          gap: 8px;
        }
      }
    </style>
  </head>
  <body>
    <header class="殼 頁首">
      <div>
        <p class="標籤">讀經計劃</p>
        <h1>按日閱讀，逐項點選</h1>
        <p class="引言">每一日都會顯示短摘要；你可以直接點入詳情、勾選已讀、再用廣東話朗讀。所有顯示文字已改成中文。</p>
      </div>
      <div class="動作列">
        <button class="按鈕" id="清除進度" type="button">重設進度</button>
        <button class="按鈕主" id="朗讀按鈕" type="button">廣東話朗讀</button>
      </div>
    </header>

    <main class="殼 主版">
      <section class="卡片">
        <div class="卡片內">
          <div>
            <h2>全部日程</h2>
            <p class="標題小">你可以直接睇到每一日嘅短摘要，點一下就開啟詳情。</p>
          </div>

          <div class="統計列" style="margin-bottom: 16px;">
            <div class="統計"><strong id="已讀數">0</strong><span>已讀日子</span></div>
            <div class="統計"><strong id="總數">0</strong><span>總日數</span></div>
            <div class="統計"><strong id="完成率">0%</strong><span>完成比例</span></div>
          </div>

          <div class="進度條" aria-hidden="true"><div class="進度填充" id="總進度"></div></div>
          <p class="細字" style="margin: 10px 0 0;" id="進度文字"></p>

          <div id="月份容器" class="月份區" style="margin-top: 18px;"></div>
        </div>
      </section>

      <aside class="詳情" aria-live="polite">
        <div class="詳情內" id="詳情容器">
          <div class="詳情空白">
            <h2>詳情</h2>
            <p>點選左邊任何一日，就會顯示經文、主題同勾選狀態。</p>
          </div>
        </div>
      </aside>
    </main>

        const 已讀數目 = 資料.filter((_, 索引) => 已讀(索引)).length;
        const 總數目 = 資料.length;
        const 百分比 = 總數目 ? Math.round((已讀數目 / 總數目) * 100) : 0;
        return { 已讀數目, 總數目, 百分比 };
      }

        const { 已讀數目, 總數目, 百分比 } = 計算統計();
        已讀數.textContent = 已讀數目;
        總數.textContent = 總數目;
        完成率.textContent = `${百分比}%`;
        總進度.style.width = `${百分比}%`;
        進度文字.textContent = `已完成 ${已讀數目} 日，共 ${總數目} 日`;
      }

      function 解析經文引用(經文) {
        const 匹配 = 經文.match(/^(.+?)\s+(.+)$/);
        if (!匹配) {
          return null;
        }

        const 書卷 = 匹配[1].trim();
        const 範圍字串 = 匹配[2].replace(/\s+/g, '');
        const api書卷 = 經文書卷對照[書卷] || 書卷;
        const json書卷 = JSON書卷對照[書卷] || null;
        const 區段 = 範圍字串.split(',').map((段) => 段.trim()).filter(Boolean).map((段) => {
          const [起點, 終點原] = 段.split('-');
          const [起章, 起節] = 起點.split(':').map((值) => Number(值));
          let 末章 = 起章;
          let 末節 = 起節;

          if (終點原) {
            if (終點原.includes(':')) {
              const [章, 節] = 終點原.split(':').map((值) => Number(值));
              末章 = 章;
              末節 = 節;
            } else {
              末節 = Number(終點原);
            }
          }

          return { 起章, 起節, 末章, 末節 };
        });

        return { 書卷, api書卷, json書卷, 範圍字串, 區段 };
      }

      function 組合經文查詢(引用, 區段) {
        if (區段.起章 === 區段.末章) {
          return `${引用.api書卷}${區段.起章}:${區段.起節}-${區段.末節}`;
        }

        return `${引用.api書卷}${區段.起章}:${區段.起節}-${區段.末章}:${區段.末節}`;
      }

        return `

                <h3>${escapeHtml(引用文字)}</h3>

      async function 讀取本地聖經資料() {
        if (聖經資料快取) {
          return 聖經資料快取;
        }

        const 回應 = await fetch('ChiUn%20(1).json');
        if (!回應.ok) {
          throw new Error('本地聖經資料檔無法讀取');
        }

        const 原始 = await 回應.json();
        const 索引 = new Map();

        for (const 書卷 of (原始.books || [])) {
          const 章索引 = new Map();
          for (const 章 of (書卷.chapters || [])) {
            章索引.set(Number(章.chapter), 章.verses || []);
          }
          索引.set(書卷.name, 章索引);
        }

        聖經資料快取 = 索引;
        return 聖經資料快取;
      }

      function 顯示經文載入中() {
        const 容器 = document.getElementById('全文經文容器');
        if (!容器) return;
        容器.innerHTML = '<div class="經文載入">載入全文經文中...</div>';
      }

      async function 取得全文經文資料(索引) {
        const 項 = 資料[索引];
        if (!項) return [];

        const 解析 = 解析經文引用(項.經文);
        if (!解析) {
          throw new Error('無法解析經文引用');
        }

        if (!解析.json書卷) {
          throw new Error('本地資料未支援此書卷');
        }

        狀態.全文索引 = 索引;

        const 快取資料 = 經文快取.get(項.經文);
        if (快取資料) {
          return 快取資料;
        }

        const 聖經索引 = await 讀取本地聖經資料();
        const 書卷章索引 = 聖經索引.get(解析.json書卷);
        if (!書卷章索引) {
          throw new Error('本地資料找不到對應書卷');
        }

        const 所有節 = [];
        for (const 區段 of 解析.區段) {
          for (let 章 = 區段.起章; 章 <= 區段.末章; 章 += 1) {
            const 章節內容 = 書卷章索引.get(章) || [];
            if (!章節內容.length) {
              continue;
            }

            const 起節 = 章 === 區段.起章 ? 區段.起節 : 1;
            const 末節 = 章 === 區段.末章 ? 區段.末節 : 999;

            const 節列表 = 章節內容.filter((節) => {
              const 節號 = Number(節.verse);
              return 節號 >= 起節 && 節號 <= 末節;
            }).map((節) => ({
              sec: String(節.verse),
              bible_text: String(節.text || '').replace(/\s+/g, ''),
            }));

            所有節.push(...節列表);
          }
        }

        if (!所有節.length) {
          throw new Error('搵唔到對應全文經文');
        }

        經文快取.set(項.經文, 所有節);
        return 所有節;
      }

        容器.innerHTML = '<div class="經文載入">載入全文經文中...</div>';

        try {

          容器.innerHTML = 轉換成頁面顯示(經文資料, 項.經文);
          綁定全文朗讀(項);
        } catch {
          容器.innerHTML = '<div class="經文錯誤">無法由本地資料載入全文經文，請確認 JSON 檔案存在並可讀取。</div>';
        }

            return 節號 && 節文 ? `第${節號}節，${節文}` : 節文;
          }).filter(Boolean).join('。') : `${項.經文}。${項.主題}`;

          朗讀內容(內容);

      }

        渲染();
        顯示詳情(索引);
        在卡片顯示全文(索引);
      }

      function 停止朗讀聲音() {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
        }
      }

      function 取得廣東話聲線() {
        const 聲線 = window.speechSynthesis?.getVoices?.() || [];
        if (!聲線.length) return null;

        const 檢查 = [
          (聲) => /yue/i.test(聲.lang) || /cantonese|粵|廣東/i.test(聲.name),
          (聲) => /zh-HK/i.test(聲.lang),
          (聲) => /^zh/i.test(聲.lang),
        ];

        for (const 規則 of 檢查) {
          const 找到 = 聲線.find(規則);
          if (找到) return 找到;
        }

        return 聲線[0];
      }

      function 朗讀內容(文字) {
        if (!('speechSynthesis' in window)) {
          alert('你嘅瀏覽器未支援朗讀功能。');
          return;
        }

        停止朗讀聲音();
        const 句子 = new SpeechSynthesisUtterance(文字);
        句子.lang = 'zh-HK';
        句子.rate = 0.95;
        句子.pitch = 1;
        句子.volume = 1;
        const 聲線 = 取得廣東話聲線();
        if (聲線) 句子.voice = 聲線;
        window.speechSynthesis.speak(句子);
      }

      function 重設進度() {
        狀態.已讀 = {};
        儲存進度();
        渲染();
        顯示詳情(狀態.選中);
      }

      function 渲染() {
        分組月份();
        更新統計();

        月份容器.querySelectorAll('.日卡').forEach((卡) => {
          卡.addEventListener('click', () => {
            const 索引 = Number(卡.dataset.索引);
            狀態.選中 = 索引;
            渲染();
            顯示詳情(索引);
            在卡片顯示全文(索引);
          });
          卡.addEventListener('keydown', (事件) => {
            if (事件.key === 'Enter' || 事件.key === ' ') {
              事件.preventDefault();
              const 索引 = Number(卡.dataset.索引);
              狀態.選中 = 索引;
              渲染();
              顯示詳情(索引);
              在卡片顯示全文(索引);
            }
          });
        });

        月份容器.querySelectorAll('.經文按鈕[data-全文索引]').forEach((按鈕) => {
          按鈕.addEventListener('click', (事件) => {
            事件.stopPropagation();
            const 索引 = Number(按鈕.dataset.全文索引);
            顯示詳情(索引);
            顯示經文載入中();
            載入全文經文(索引);
          });
        });

        月份容器.querySelectorAll('input[data-checkbox]').forEach((方塊) => {
          方塊.addEventListener('change', (事件) => {
            事件.stopPropagation();
            切換已讀(Number(方塊.dataset.checkbox), 方塊.checked);
          });
        });
      }

      清除進度.addEventListener('click', 重設進度);
      朗讀按鈕.addEventListener('click', () => {
        const 項 = 資料[狀態.選中];
        if (!項) {
          alert('請先選一日。');
          return;
        }
        朗讀內容(`${項.經文}。${項.主題}`);
      });

      if ('speechSynthesis' in window) {
        window.speechSynthesis.addEventListener('voiceschanged', () => {});
      }

      渲染();
      顯示詳情(0);
      在卡片顯示全文(0);
    </script>
  </body>
</html>
